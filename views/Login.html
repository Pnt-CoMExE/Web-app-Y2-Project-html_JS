<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asset Borrowing System</title>

    <link href="/bootstrap5/css/bootstrap.min.css" rel="stylesheet">
    <script src="/bootstrap5/js/bootstrap.min.js"></script>
    <script src="/bootstrap5/js/sweetalert2.all.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            background: url('../img/bg/background1.jpeg');
            background-size: cover;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit; /* Inherit the background image */
            filter: blur(10px);
            z-index: -1;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center">Motorcycle Borrowing</h3>
        <label>Username</label>
        <input type="text" class="form-control mb-2" id="loginUsername">
        <label>Password</label>
        <input type="password" class="form-control mb-2" id="loginPassword">
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        <p class="mt-2 text-center">
            Don't have an account? <a href="/register">Register</a>
        </p>
    </div>

    <script>
        let isLoggingIn = false; // Prevent multiple simultaneous login attempts

        async function login() {
            if (isLoggingIn) {
                console.log('Login already in progress, please wait...');
                Swal.fire('Warning', 'A login attempt is already in progress. Please wait.', 'warning');
                return;
            }

            isLoggingIn = true;
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                Swal.fire('Error', 'Please fill in both username and password.', 'error');
                isLoggingIn = false;
                return;
            }

            try {
                console.log('Attempting login for username:', username);
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Include cookies in the request
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                console.log('Login response status:', response.status);
                console.log('Login response:', result);

                if (result.success) {
                    // Store minimal user info in localStorage for display purposes
                    localStorage.setItem('username', result.username);
                    localStorage.setItem('role', result.role);
                    localStorage.setItem('userId', result.userId);
                    Swal.fire('Success', 'Login successful!', 'success').then(() => {
                        // Redirect based on role
                        if (result.role === 1) window.location.href = '/student/motorcycles';
                        else if (result.role === 2) window.location.href = '/staff/home';
                        else if (result.role === 3) window.location.href = '/lender/home';
                        else window.location.href = '/';
                    });
                } else {
                    Swal.fire('Error', result.message || 'Login failed.', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                Swal.fire('Error', 'Failed to connect to the server. Please try again.', 'error');
            } finally {
                isLoggingIn = false;
            }
        }
    </script>
</body>
</html>
