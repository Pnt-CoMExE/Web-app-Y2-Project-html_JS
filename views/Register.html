<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Asset Borrowing System</title>
    <link href="/bootstrap5/css/bootstrap.min.css" rel="stylesheet">
    <script src="/bootstrap5/js/sweetalert2.all.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            background: url('../img/bg/background1.jpeg');
            background-size: cover;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            /* Inherit the background image */
            filter: blur(10px);
            z-index: -1;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center">Register</h3>
        <label>Username</label>
        <input type="text" class="form-control mb-2" id="username">
        <label>Password</label>
        <input type="password" class="form-control mb-2" id="password">
        <label>Confirm Password</label>
        <input type="password" class="form-control mb-3" id="confirmPassword">
        <button class="btn btn-success w-100" onclick="register()">Register</button>
        <p class="mt-2 text-center">
            Already have an account? <a href="/">Login</a>
        </p>
    </div>

    <script>
        function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username || !password || !confirmPassword) {
                Swal.fire('Error', 'Please fill in all fields.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                Swal.fire('Error', 'Passwords do not match.', 'error');
                return;
            }

            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        Swal.fire({
                            title: 'Registration Successful!',
                            text: 'Please login to continue.',
                            icon: 'success',
                            confirmButtonText: 'OK'
                        }).then(() => {
                            window.location.href = "/views/Login.html";
                        });
                    } else {
                        Swal.fire('Error', data.message, 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    Swal.fire('Error', 'An error occurred. Please try again.', 'error');
                });
        }
    </script>

</body>

</html>
