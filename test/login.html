<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Borrowing System - Login/Register</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
</head>
<style>
    body {
        background: linear-gradient(135deg, #6e8efb, #a777e3);
        min-height: 100vh;
    }
    
    .auth-card {
        width: 100%;
        max-width: 400px;
        border-radius: 15px;
        animation: fadeIn 0.5s ease-in;
    }
    
    .card-header {
        border-top-left-radius: 15px;
        border-top-right-radius: 15px;
    }
    
    .nav-tabs .nav-link {
        color: #555;
        font-weight: 500;
    }
    
    .nav-tabs .nav-link.active {
        color: #0d6efd;
        border-bottom: 3px solid #0d6efd;
    }
    
    .form-control, .form-select {
        border-radius: 8px;
        transition: all 0.3s ease;
    }
    
    .form-control:focus, .form-select:focus {
        box-shadow: 0 0 8px rgba(13, 110, 253, 0.2);
        border-color: #0d6efd;
    }
    
    .btn-primary, .btn-success {
        border-radius: 8px;
        padding: 0.75rem;
        font-weight: 500;
        transition: transform 0.3s ease, background 0.3s ease;
    }
    
    .btn-primary:hover {
        transform: scale(1.02);
    }
    
    .btn-success:hover {
        background-color: #218838;
        transform: scale(1.02);
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    @media (max-width: 576px) {
        .auth-card {
            margin: 1rem;
        }
    }
</style>

<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg auth-card">
            <div class="card-header text-center bg-primary text-white">
                <h2 class="mb-0">Asset Borrowing System</h2>
            </div>
            <div class="card-body">
                <!-- Tabs for Login/Register -->
                <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" aria-controls="register" aria-selected="false">Register</button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content" id="authTabContent">
                    <!-- Login Form -->
                    <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                        <form id="login-form" onsubmit="return false;">
                            <div class="mb-3">
                                <label for="login-username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="login-username" placeholder="Enter your username" required>
                            </div>
                            <div class="mb-3">
                                <label for="login-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required>
                            </div>
                            <button type="button" class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
                            <div id="login-message" class="mt-3 text-danger text-center"></div>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                        <form id="register-form" onsubmit="return false;">
                            <div class="mb-3">
                                <label for="register-username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="register-username" placeholder="Choose a username" required>
                            </div>
                            <div class="mb-3">
                                <label for="register-password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="register-password" placeholder="Create a password" required>
                            </div>
                            <div class="mb-3">
                                <label for="register-role" class="form-label">Role</label>
                                <select class="form-select" id="register-role" required>
                                    <option value="" disabled selected>Select your role</option>
                                    <option value="borrower">Borrower (Student)</option>
                                    <option value="lender">Lender (Lecturer/Staff)</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-success w-100" onclick="handleRegister()">Register</button>
                            <div id="register-message" class="mt-3 text-danger text-center"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script>
        // Simulated user storage using localStorage
let users = JSON.parse(localStorage.getItem('users')) || {};

// Handle Registration
function handleRegister() {
    const username = document.getElementById('register-username').value.trim();
    const password = document.getElementById('register-password').value.trim();
    const role = document.getElementById('register-role').value;
    const messageDiv = document.getElementById('register-message');

    // Validation
    if (!username || !password || !role) {
        messageDiv.textContent = 'Please fill in all fields.';
        return;
    }

    if (password.length < 6) {
        messageDiv.textContent = 'Password must be at least 6 characters long.';
        return;
    }

    if (users[username]) {
        messageDiv.textContent = 'Username already exists. Please choose another.';
        return;
    }

    // Store user data
    users[username] = { password, role };
    localStorage.setItem('users', JSON.stringify(users));
    messageDiv.classList.remove('text-danger');
    messageDiv.classList.add('text-success');
    messageDiv.textContent = 'Registration successful! Please login.';

    // Clear form
    document.getElementById('register-form').reset();

    // Switch to login tab
    const loginTab = new bootstrap.Tab(document.getElementById('login-tab'));
    loginTab.show();
}

// Handle Login
function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const messageDiv = document.getElementById('login-message');

    // Validation
    if (!username || !password) {
        messageDiv.textContent = 'Please fill in all fields.';
        return;
    }

    const user = users[username];
    if (!user || user.password !== password) {
        messageDiv.textContent = 'Invalid username or password.';
        return;
    }

    // Store current user in localStorage for dashboard access
    localStorage.setItem('currentUser', JSON.stringify({ username, role: user.role }));
    messageDiv.classList.remove('text-danger');
    messageDiv.classList.add('text-success');
    messageDiv.textContent = 'Login successful! Redirecting...';

    // Redirect to dashboard (you can create dashboard.html separately)
    setTimeout(() => {
        window.location.href = 'dashboard.html';
    }, 1000);
}
    </script>
</body>
</html>
