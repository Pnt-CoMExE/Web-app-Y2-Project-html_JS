<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Borrowing System - Login/Signup</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        
        .container-fluid {
            height: 100vh;
        }
        
        .row {
            height: 100%;
        }
        
        /* Left Side: Image Section */
        .image-section {
            background: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') no-repeat center center;
            background-size: cover;
            position: relative;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .overlay p {
            font-size: 1.2rem;
        }
        
        /* Right Side: Form Section */
        .form-section {
            background: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .form-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        
        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
            justify-content: center;
        }
        
        .nav-tabs .nav-link {
            color: #555;
            font-weight: 500;
            padding: 0.5rem 2rem;
            border: none;
        }
        
        .nav-tabs .nav-link.active {
            color: #4a00e0;
            border-bottom: 3px solid #4a00e0;
        }
        
        .form-control, .form-select {
            border-radius: 25px;
            padding: 0.75rem 1rem;
            border: 1px solid #e0e0e0;
            background: #fff;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #4a00e0;
            box-shadow: 0 0 5px rgba(74, 0, 224, 0.2);
        }
        
        .position-relative {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #aaa;
        }
        
        .form-control, .form-select {
            padding-left: 2.5rem !important;
        }
        
        .btn-gradient {
            background: linear-gradient(to right, #4a00e0, #8e2de2);
            color: white;
            border-radius: 25px;
            padding: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            background: linear-gradient(to right, #3a00b0, #7a1dc2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 0, 224, 0.3);
        }
        
        @media (max-width: 767px) {
            .form-section {
                height: 100vh;
            }
        
            .form-container {
                padding: 1rem;
            }
        
            .overlay h1 {
                font-size: 1.5rem;
            }
        
            .overlay p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Left Side: Image with Overlay -->
            <div class="col-md-6 d-none d-md-block image-section">
                <div class="overlay">
                    <h1>Asset Borrowing System</h1>
                    <p>Streamline your borrowing experience with ease and efficiency.</p>
                </div>
            </div>
            <!-- Right Side: Login/Signup Form -->
            <div class="col-md-6 form-section d-flex align-items-center justify-content-center">
                <div class="form-container">
                    <!-- Tabs for Login/Signup -->
                    <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab" aria-controls="signup" aria-selected="false">Signup</button>
                        </li>
                    </ul>

                    <!-- Tab Content -->
                    <div class="tab-content" id="authTabContent">
                        <!-- Login Form -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                            <form id="login-form" onsubmit="return false;">
                                <div class="mb-3 position-relative">
                                    <input type="text" class="form-control" id="login-username" placeholder="Username" required>
                                    <i class="fas fa-user input-icon"></i>
                                </div>
                                <div class="mb-3 position-relative">
                                    <input type="password" class="form-control" id="login-password" placeholder="Password" required>
                                    <i class="fas fa-lock input-icon"></i>
                                </div>
                                <button type="button" class="btn btn-gradient w-100" onclick="handleLogin()">Login</button>
                                <div id="login-message" class="mt-3 text-danger text-center"></div>
                            </form>
                        </div>

                        <!-- Signup Form -->
                        <div class="tab-pane fade" id="signup" role="tabpanel" aria-labelledby="signup-tab">
                            <form id="signup-form" onsubmit="return false;">
                                <div class="mb-3 position-relative">
                                    <input type="text" class="form-control" id="signup-username" placeholder="Username" required>
                                    <i class="fas fa-user input-icon"></i>
                                </div>
                                <div class="mb-3 position-relative">
                                    <input type="password" class="form-control" id="signup-password" placeholder="Password" required>
                                    <i class="fas fa-lock input-icon"></i>
                                </div>
                                <div class="mb-3 position-relative">
                                    <select class="form-select" id="signup-role" required>
                                        <option value="" disabled selected>Select Role</option>
                                        <option value="borrower">Borrower (Student)</option>
                                    </select>
                                    <i class="fas fa-user-tag input-icon"></i>
                                </div>
                                <button type="button" class="btn btn-gradient w-100" onclick="handleSignup()">Signup</button>
                                <div id="signup-message" class="mt-3 text-danger text-center"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script>
        // Simulated user storage using localStorage
let users = JSON.parse(localStorage.getItem('users')) || {};

// Handle Signup
function handleSignup() {
    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value.trim();
    const role = document.getElementById('signup-role').value;
    const messageDiv = document.getElementById('signup-message');

    // Validation
    if (!username || !password || !role) {
        messageDiv.textContent = 'Please fill in all fields.';
        return;
    }

    if (password.length < 6) {
        messageDiv.textContent = 'Password must be at least 6 characters long.';
        return;
    }

    if (users[username]) {
        messageDiv.textContent = 'Username already exists. Please choose another.';
        return;
    }

    // Store user data
    users[username] = { password, role };
    localStorage.setItem('users', JSON.stringify(users));
    messageDiv.classList.remove('text-danger');
    messageDiv.classList.add('text-success');
    messageDiv.textContent = 'Signup successful! Please login.';

    // Clear form
    document.getElementById('signup-form').reset();

    // Switch to login tab
    const loginTab = new bootstrap.Tab(document.getElementById('login-tab'));
    loginTab.show();
}

// Handle Login
function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const messageDiv = document.getElementById('login-message');

    // Validation
    if (!username || !password) {
        messageDiv.textContent = 'Please fill in all fields.';
        return;
    }

    const user = users[username];
    if (!user || user.password !== password) {
        messageDiv.textContent = 'Invalid username or password.';
        return;
    }

    // Store current user in localStorage for dashboard access
    localStorage.setItem('currentUser', JSON.stringify({ username, role: user.role }));
    messageDiv.classList.remove('text-danger');
    messageDiv.classList.add('text-success');
    messageDiv.textContent = 'Login successful! Redirecting...';

    // Redirect to dashboard
    setTimeout(() => {
        window.location.href = 'dashboard.html';
    }, 3000);
}
    </script>
</body>
</html>
