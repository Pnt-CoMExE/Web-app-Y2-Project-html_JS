<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Room Reservation Dashboard</title>
    <link rel="stylesheet" href="../bootstrap5/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #eef2f7;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 600;
            color: #343a40;
        }

        .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .room-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .room-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .vacant {
            background: #d4edda;
            color: green;
        }

        .booked {
            background: #fff3cd;
            color: yellowgreen;
        }

        .in-use {
            background: #f8d7da;
            color: red;
        }

        .closed {
            background: #d6d8db;
            color: gray;
        }

        .status-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .status-panel div {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .btn {
            width: 300px;
            background-color: rgb(73, 180, 251);
            color: white;
        }

        .btn :hover{
            background-color: rgb(12, 79, 124);
        }

    </style>
</head>

<body>

    <div class="container">
        <h2 class="header">Meeting Room Reservation Dashboard</h2>
        <div class="row">
            <div class="col-md-8">
                <div class="room-list" id="roomList"></div>
            </div>
            <div class="col-md-4">
                <div class="status-panel">
                    <h3>Room Status Summary</h3>
                    <div><i class="bi bi-check-circle text-success"></i> Vacant: <span id="vacantCount">0</span></div>
                    <div><i class="bi bi-calendar-check text-warning"></i> Booked: <span id="bookedCount">0</span></div>
                    <div><i class="bi bi-person-fill text-danger"></i> In Use: <span id="inUseCount">0</span></div>
                    <div><i class="bi bi-x-circle text-secondary"></i> Closed: <span id="closedCount">0</span></div>
                </div>
                <div class="text-center d-flex justify-content-center">
                    <button class="btn mt-4">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rooms = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        let roomList = document.getElementById("roomList");

        let icons = {
            vacant: "bi-check-circle",
            booked: "bi-calendar-check",
            in_use: "bi-person-fill",
            closed: "bi-x-circle"
        };

        rooms.forEach(room => {
            let roomDiv = document.createElement("div");
            roomDiv.classList.add("room-card", "vacant");
            roomDiv.id = `room-${room}`;
            roomDiv.innerHTML = `
            <i class="bi ${icons.vacant}"></i>
            <h4>Meeting Room ${room}</h4>
            <select class="form-select status-select" onchange="updateStatus(this, '${room}')">
                <option value="vacant" selected>Vacant</option>
                <option value="booked">Booked</option>
                <option value="in-use">In Use</option>
                <option value="closed">Closed</option>
            </select>
            <div class="status-info mt-2" id="status-info-${room}">Status: Vacant</div>
        `;
            roomList.appendChild(roomDiv);
        });

        function updateStatus(selectElement, room) {
            let statuses = {
                vacant: { class: 'vacant', text: 'Vacant', icon: "bi-check-circle" },
                booked: { class: 'booked', text: 'Booked', icon: "bi-calendar-check" },
                in_use: { class: 'in-use', text: 'In Use', icon: "bi-person-fill" },
                closed: { class: 'closed', text: 'Closed', icon: "bi-x-circle" }
            };

            let selectedStatus = selectElement.value.replace('-', '_');
            let roomCard = document.getElementById(`room-${room}`);
            let statusInfoDiv = document.getElementById(`status-info-${room}`);
            let icon = roomCard.querySelector("i");

            roomCard.className = `room-card ${statuses[selectedStatus].class}`;
            statusInfoDiv.innerHTML = `Status: ${statuses[selectedStatus].text}`;
            icon.className = `bi ${statuses[selectedStatus].icon}`;

            updateSummary();
        }

        function updateSummary() {
            let counts = { vacant: 0, booked: 0, in_use: 0, closed: 0 };

            rooms.forEach(room => {
                let roomCard = document.getElementById(`room-${room}`);

                if (roomCard.classList.contains("vacant")) {
                    counts.vacant++;
                } else if (roomCard.classList.contains("booked")) {
                    counts.booked++;
                } else if (roomCard.classList.contains("in-use")) {
                    counts.in_use++;
                } else if (roomCard.classList.contains("closed")) {
                    counts.closed++;
                }
            });

            document.getElementById("vacantCount").innerText = counts.vacant;
            document.getElementById("bookedCount").innerText = counts.booked;
            document.getElementById("inUseCount").innerText = counts.in_use;
            document.getElementById("closedCount").innerText = counts.closed;
        }

    </script>

</body>

</html>
