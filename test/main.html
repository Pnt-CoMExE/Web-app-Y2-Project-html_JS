<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f2f5, #e0e7ff);
            color: #333;
        }

        .container-fluid {
            height: 10vh;
        }

        .row {
            height: 100%;
        }

        /* Login/Signup Styles */
        .image-section {
            background: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80') no-repeat center center;
            background-size: cover;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .overlay h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .overlay p {
            font-size: 1.2rem;
        }

        .form-section {
            background: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
            justify-content: center;
        }

        .nav-tabs .nav-link {
            color: #555;
            font-weight: 500;
            padding: 0.5rem 2rem;
            border: none;
        }

        .nav-tabs .nav-link.active {
            color: #4a00e0;
            border-bottom: 3px solid #4a00e0;
        }

        .position-relative {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: #aaa;
        }

        .form-control, .form-select {
            border-radius: 25px;
            padding: 0.75rem 1rem;
            padding-left: 2.5rem !important;
            border: 1px solid #e0e0e0;
            background: #fff;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #4a00e0;
            box-shadow: 0 0 5px rgba(74, 0, 224, 0.2);
        }

        .btn-gradient {
            background: linear-gradient(to right, #4a00e0, #8e2de2);
            color: white;
            border-radius: 25px;
            padding: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            background: linear-gradient(to right, #3a00b0, #7a1dc2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 0, 224, 0.3);
        }

        /* Navbar Styles (Smaller Version) */
        .bg-gradient-dark {
            background: linear-gradient(to right, #333, #444);
        }

        .navbar-small {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            min-height: 40px;
        }

        .navbar-brand {
            color: #fff !important;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 0;
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
            margin-left: 0.5rem;
            padding: 0.25rem 0.5rem;
            transition: color 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: #8e2de2 !important;
        }

        .navbar-toggler {
            padding: 0.1rem 0.3rem;
            font-size: 0.8rem;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.8)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        .borrower-only, .lender-only {
            display: none;
        }

        /* Dashboard Styles */
        .container {
            padding: 2rem;
        }

        h2 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stats-card {
            border-radius: 15px;
            transition: transform 0.3s ease;
        }

        .stats-card:hover {
            transform: translateY(-10px);
        }

        .bg-success { background: #28a745 !important; }
        .bg-warning { background: #ffc107 !important; }
        .bg-info { background: #17a2b8 !important; }
        .bg-danger { background: #dc3545 !important; }

        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .bg-gradient-primary {
            background: linear-gradient(to right, #4a00e0, #8e2de2);
        }

        .asset-card {
            border: none;
            border-radius: 10px;
            overflow: hidden;
        }

        .card-img-top {
            height: 200px;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .card-img-top:hover {
            opacity: 0.8;
        }

        .card-body {
            background: #fff;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #333;
        }

        .card-text {
            font-size: 1rem;
            color: #666;
        }

        .list-group-flush .list-group-item {
            background: transparent;
            border: none;
            padding: 0.75rem 0;
            transition: background 0.3s ease;
        }

        .list-group-item:hover {
            background: #f8f9fa;
            border-radius: 8px;
        }

        .btn-success, .btn-danger {
            border-radius: 25px;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        #auth-section, #dashboard-section {
            display: none;
        }

        #auth-section.active, #dashboard-section.active {
            display: block;
        }

        @media (max-width: 767px) {
            .form-section {
                height: 100vh;
            }

            .form-container {
                padding: 1rem;
            }

            .overlay h1 {
                font-size: 1.5rem;
            }

            .overlay p {
                font-size: 0.9rem;
            }

            .navbar-nav {
                text-align: center;
            }

            .nav-link {
                margin: 0.25rem 0;
            }

            .stats-card {
                margin-bottom: 1rem;
            }

            .col-md-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }
        }
    </style>



</head>
<body>
    <!--navbar-->
    <nav class="navbar navbar-expand-lg bg-body-tertiary rounded" aria-label="Thirteenth navbar example">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample11" aria-controls="navbarsExample11" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
  
          <div class="collapse navbar-collapse d-lg-flex " id="navbarsExample11">
            <a class="navbar-brand col-lg-3 me-0" href="#">Centered nav</a>
            <ul class="navbar-nav col-lg-6 justify-content-lg-center">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li>
              <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
              </li>
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown" aria-expanded="false">Dropdown</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                  <li><a class="dropdown-item" href="#">Something else here</a></li>
                </ul>
              </li>
            </ul>
            <div class="d-lg-flex col-lg-3 justify-content-lg-end">
              <button class="btn btn-danger">Logout</button>
            </div>
          </div>
        </div>
      </nav>
</body>
</html>
